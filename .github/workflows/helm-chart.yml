name: publish helm chart

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: chart/app version to publish (without leading v)
        required: true

jobs:
  push:
    name: push helm chart to the OCI registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: set up helm
        uses: azure/setup-helm@v4

      - name: resolve version
        id: version
        run: |
          # Chart version must be clean semver (no "v" prefix). App version
          # tracks the image tag docker/build-push-action actually pushes
          # (ghcr.io/plakarkorp/plakar-edge:<git ref name>, "v" kept), so the
          # chart's default image.tag resolves to a real, existing image.
          if [ -n "${{ github.event.inputs.version }}" ]; then
            INPUT="${{ github.event.inputs.version }}"
            echo "chart=${INPUT#v}" >> "$GITHUB_OUTPUT"
            echo "app=${INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "chart=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "app=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: package chart
        run: |
          helm package charts/plakar-edge \
            --version "${{ steps.version.outputs.chart }}" \
            --app-version "${{ steps.version.outputs.app }}" \
            --destination dist

      - name: login to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} --password-stdin

      - name: push chart
        run: helm push dist/plakar-edge-*.tgz oci://ghcr.io/plakarkorp/charts
