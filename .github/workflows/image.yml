name: publish docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  push:
    name: push docker image to the artifact registry
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push the image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/plakarkorp/plakar-edge:latest
            ghcr.io/plakarkorp/plakar-edge:${{ github.sha }}-${{ github.run_id }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('ghcr.io/plakarkorp/plakar-edge:{0}', github.ref_name) || '' }}
